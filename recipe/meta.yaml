{% set name = "squirrel-datasets-core" %}
{% set version = "0.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/squirrel_datasets_core-{{ version }}.tar.gz
  sha256: 7d22c05101bd40a0e7d8c668dc31d3590441349321ba0aa77a15de8fab534585

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }},<4.0
    - docutils >=0.17.1,<0.18
    - fire >=0.4.0,<0.5
    - pillow >=9.4.0,<10.0
    - scipy >=1.9.3,<2.0
    - squirrel-core >=0.19.0,<1.0
    - datasets >=2.9.0,<3.0
    - pyspark >=3.2.2,<4.0
    - torchvision >=0.14.1,<0.15

test:
  imports:
    - squirrel_datasets_core
    - squirrel
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/squirrel-datasets-core/
  summary: Squirrel public datasets collection.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ThomasWollmann
    - winfried-ripken
    - AlirezaSohofi
    - maik-schmidt
    - hosseinkarjoo
